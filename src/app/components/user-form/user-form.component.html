<!-- src/app/components/user-form/user-form.component.html -->

<div class="user-form">
    <div *ngIf="error" class="error-message">{{ error }}</div>
    <div *ngIf="loading" class="loading-indicator">Loading...</div>
    
    <form [formGroup]="userForm" (ngSubmit)="onSave()">
      <div class="form-field">
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" formControlName="first_name">
        <span class="error" *ngIf="userForm.get('first_name')?.errors && (userForm.get('first_name')?.touched || submitAttempted)">
          {{ getErrorMessage('first_name') }}
        </span>
      </div>
      <div class="form-field">
        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" formControlName="last_name">
        <span class="error" *ngIf="userForm.get('last_name')?.errors && (userForm.get('last_name')?.touched || submitAttempted)">
          {{ getErrorMessage('last_name') }}
        </span>
      </div>
      <div class="form-field">
        <label for="full_name">Full Name:</label>
        <input type="text" id="full_name" formControlName="full_name" [disabled]="true">
      </div>
      <div class="form-field">
        <label for="age">Age:</label>
        <input type="number" id="age" formControlName="age">
        <span class="error" *ngIf="userForm.get('age')?.errors && (userForm.get('age')?.touched || submitAttempted)">
          {{ getErrorMessage('age') }}
        </span>
      </div>
      <div class="form-field">
        <label for="email">Email:</label>
        <input type="email" id="email" formControlName="email">
        <span class="error" *ngIf="userForm.get('email')?.errors && (userForm.get('email')?.touched || submitAttempted)">
          {{ getErrorMessage('email') }}
        </span>
      </div>
      
      <!-- Skills Section -->
      <div class="form-field skills-section">
        <label for="skills">Skills:</label>
        <div class="skills-input-container">
          <input type="text" 
                 id="skills" 
                 [formControl]="newSkill" 
                 placeholder="Add a skill..."
                 (keyup.enter)="addSkill(newSkill.value || '')">
          <button type="button" 
                  (click)="addSkill(newSkill.value || '')" 
                  class="add-skill-btn">
            Add
          </button>
        </div>
        
        <!-- Skills suggestions -->
        <div class="skills-suggestions">
          <span *ngFor="let skill of skillSuggestions" 
                (click)="addSkill(skill)" 
                class="skill-suggestion">
            {{skill}}
          </span>
        </div>

        <!-- Selected skills -->
        <div class="selected-skills" [class.error-border]="userForm.get('skills')?.errors && (userForm.get('skills')?.touched || submitAttempted)">
          <div *ngFor="let skill of userForm.get('skills')?.value" class="skill-tag">
            {{skill}}
            <button type="button" (click)="removeSkill(skill)" class="remove-skill-btn">&times;</button>
          </div>
        </div>
        <span class="error" *ngIf="userForm.get('skills')?.errors && (userForm.get('skills')?.touched || submitAttempted)">
          {{ getErrorMessage('skills') }}
        </span>
      </div>

      <div class="form-buttons">
        <button type="submit" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
</div>
